# Build + publish ffmpeg static-lib tarballs for Acrux.
#
# Triggered manually via `gh workflow run build-prebuilts.yml` (or
# the "Run workflow" button in the GitHub UI). Mac/Linux jobs build
# ffmpeg from source; Windows downloads a prebuilt from BtbN and
# repackages it (see comment above the Windows step for why).
# All four tarballs end up as release assets under the
# `ffmpeg-prebuilt-vX.Y.Z` tag (see the `version` input below).
#
# Mac/Linux flow:
#   1. Compile ffmpeg-sys-next's `build` feature in a scratch crate
#      — that does the heavy lifting of cloning ffmpeg source and
#      ./configure + make with the right flags (LGPLv3, OpenSSL for
#      RTMPS, no encoders we don't use).
#   2. Pluck the resulting libavformat/libavcodec/libavutil out of
#      the build output.
#   3. Strip debug symbols.
#   4. Tar + upload as `ffmpeg-prebuilt-{os}-{arch}.tar.gz`.
#
# Windows flow (different — see big comment above its step):
#   1. Download BtbN's prebuilt LGPL shared zip pinned to ffmpeg
#      n8.1.
#   2. Repackage include/ + lib/{avformat,avcodec,avutil}.lib +
#      bin/*.dll into our tarball layout.
#   3. Tar + upload.

name: Build ffmpeg prebuilts

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'ffmpeg version tag (e.g. v8.1.0). Will be released as ffmpeg-prebuilt-{version}.'
        required: true
        default: 'v8.1.0'

# `softprops/action-gh-release` updates an existing release — that's
# a write to the repo's releases, which the default workflow token
# doesn't have. Without this the upload step fails with "Resource
# not accessible by integration".
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.tarball }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            tarball: ffmpeg-prebuilt-darwin-arm64
            strip: strip -S
          - runner: macos-13
            tarball: ffmpeg-prebuilt-darwin-x86_64
            strip: strip -S
          - runner: ubuntu-22.04
            tarball: ffmpeg-prebuilt-linux-x86_64
            strip: strip -g
          - runner: windows-2022
            tarball: ffmpeg-prebuilt-windows-x86_64
            # Windows is a repackage job — BtbN's .libs are tiny
            # import libraries and DLLs come pre-stripped.
            strip: ''

    steps:
      - uses: actions/checkout@v4

      # ===== Mac / Linux: build ffmpeg from source =====

      - name: Install Rust (Unix)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm yasm pkg-config libssl-dev

      - name: Install Mac deps
        if: runner.os == 'macOS'
        run: |
          brew install nasm yasm pkg-config openssl@3

      # Build ffmpeg via ffmpeg-sys-next's `build` feature in a
      # throwaway crate. Same code path Acrux's `build.rs` used to
      # invoke, just isolated here so the artifact is reproducible.
      - name: Create scratch crate (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/scratch/src"
          cat > "$RUNNER_TEMP/scratch/Cargo.toml" <<'EOF'
          [package]
          name = "ffmpeg-scratch"
          version = "0.1.0"
          edition = "2021"

          [dependencies]
          ffmpeg-next = { version = "8.1", default-features = false, features = [
            "codec", "format", "build", "build-license-version3", "build-lib-openssl",
          ] }
          EOF
          echo "fn main() {}" > "$RUNNER_TEMP/scratch/src/main.rs"
          ls -la "$RUNNER_TEMP/scratch"

      - name: Build ffmpeg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: ${{ runner.temp }}/scratch
        run: cargo build --release

      - name: Stage libs (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          DIST=$(ls -d "$RUNNER_TEMP"/scratch/target/release/build/ffmpeg-sys-next-*/out/dist | head -1)
          STAGE="$RUNNER_TEMP/stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/include" "$STAGE/lib"
          cp -R "$DIST/include/"* "$STAGE/include/"
          cp "$DIST/lib/"*.a "$STAGE/lib/"
          # Strip debug symbols — cuts the tarball ~10x.
          if [ -n "${{ matrix.strip }}" ]; then
            ${{ matrix.strip }} "$STAGE/lib/"*.a 2>/dev/null || true
          fi
          ls -lh "$STAGE/lib/"

      # ===== Windows: download BtbN prebuilt + repackage =====
      #
      # We do NOT build ffmpeg from source on Windows. Multiple
      # rounds proved it's a doomed approach in CI:
      #
      #   ffmpeg's ./configure is a POSIX shell script. On Windows
      #   it runs inside Git Bash's sh.exe. MSYS in sh.exe re-adds
      #   /usr/bin (= C:\Program Files\Git\usr\bin) to PATH inside
      #   the subshell, no matter what we do to the parent shell's
      #   PATH. /usr/bin contains GNU coreutils' `link.exe` (an
      #   ln-like tool) which then shadows MSVC's `link.exe`, so
      #   cl.exe's compile-test inside configure fails with
      #   "cl.exe is unable to create an executable file" and
      #   the whole build aborts. Renaming link.exe wasn't enough;
      #   the failure mode keeps moving forward.
      #
      # Pivot: BtbN (github.com/BtbN/FFmpeg-Builds) cross-compiles
      # ffmpeg from Linux with mingw-w64 and publishes LGPL builds
      # with MSVC-compatible import .lib files plus matching .dll
      # runtime files. We download their `n8.1-latest` LGPL shared
      # build (frozen to ffmpeg n8.1, matches our pinned version)
      # and repackage into our tarball layout.
      #
      # Tradeoff: shared libs mean Acrux ships 3 .dlls (~25MB) next
      # to Acrux.exe instead of statically linking. Same net footprint
      # as Mac/Linux static builds. Tauri's bundler picks them up
      # via FFMPEG_DIR/bin (see Acrux's build.rs + tauri.conf.json).
      - name: Download + stage BtbN prebuilt (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # `n8.1-latest` is BtbN's rolling-tag for the n8.1 ffmpeg
          # release line. If they ever stop publishing it, switch to
          # `latest` (master rolling) or pin to a specific autobuild
          # tag for full reproducibility.
          URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n8.1-latest-win64-lgpl-shared-8.1.zip"
          ZIP="$RUNNER_TEMP/btbn.zip"
          echo "Downloading $URL"
          curl -fsSL --retry 3 -o "$ZIP" "$URL"
          ls -lh "$ZIP"

          EXTRACT="$RUNNER_TEMP/btbn-extract"
          rm -rf "$EXTRACT"
          mkdir -p "$EXTRACT"
          unzip -q "$ZIP" -d "$EXTRACT"

          # BtbN's zip extracts to one top-level dir like
          # `ffmpeg-n8.1-latest-win64-lgpl-shared-8.1/`. Find it.
          BTBN_ROOT=$(ls -d "$EXTRACT"/ffmpeg-*-win64-lgpl-shared* | head -1)
          echo "BtbN root: $BTBN_ROOT"
          ls "$BTBN_ROOT"

          STAGE="$RUNNER_TEMP/stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/include" "$STAGE/lib" "$STAGE/bin"

          # Headers: all of them. ffmpeg-sys-next bindgen reads
          # whatever is in FFMPEG_DIR/include.
          cp -R "$BTBN_ROOT/include/"* "$STAGE/include/"

          # Import libs: only the three Acrux actually links.
          cp "$BTBN_ROOT/lib/avformat.lib" "$STAGE/lib/"
          cp "$BTBN_ROOT/lib/avcodec.lib" "$STAGE/lib/"
          cp "$BTBN_ROOT/lib/avutil.lib" "$STAGE/lib/"

          # Runtime DLLs: avformat / avcodec / avutil and the
          # transitive deps avcodec links internally (swresample,
          # swscale). Names look like `avformat-61.dll` where 61 is
          # the major SOVER.
          cp "$BTBN_ROOT/bin/"avformat-*.dll "$STAGE/bin/"
          cp "$BTBN_ROOT/bin/"avcodec-*.dll "$STAGE/bin/"
          cp "$BTBN_ROOT/bin/"avutil-*.dll "$STAGE/bin/"
          cp "$BTBN_ROOT/bin/"swresample-*.dll "$STAGE/bin/" 2>/dev/null || true
          cp "$BTBN_ROOT/bin/"swscale-*.dll "$STAGE/bin/" 2>/dev/null || true

          # Sanity prints so the workflow log makes the staged
          # contents obvious.
          echo "=== lib/ ==="
          ls -lh "$STAGE/lib/"
          echo "=== bin/ ==="
          ls -lh "$STAGE/bin/"
          echo "Header count: $(find "$STAGE/include" -name '*.h' | wc -l)"
          echo "Bin total:    $(du -sh "$STAGE/bin" | cut -f1)"

      # ===== Package + upload (all OSes) =====

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/stage"
          TARBALL="$RUNNER_TEMP/${{ matrix.tarball }}.tar.gz"
          # Windows tarball includes a bin/ dir for the .dlls; Unix
          # tarballs only have include/ + lib/.
          #
          # `--force-local` is only needed on Windows: GNU tar there
          # otherwise parses `D:\a\_temp\...tar.gz` as a `host:path`
          # remote archive (legacy rsh-style) and fails with "Cannot
          # connect to D: resolve failed". macOS ships BSD tar which
          # doesn't have --force-local AND doesn't do the host:path
          # parsing in the first place, so we leave it off there.
          TAR_FORCE_LOCAL=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            TAR_FORCE_LOCAL="--force-local"
          fi
          if [ -d bin ]; then
            tar $TAR_FORCE_LOCAL -czf "$TARBALL" include lib bin
          else
            tar $TAR_FORCE_LOCAL -czf "$TARBALL" include lib
          fi
          ls -lh "$TARBALL"
          # Print SHA256 to the workflow log so we can copy it into
          # Acrux's build.rs constants.
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$TARBALL"
          else
            sha256sum "$TARBALL"
          fi

      - name: Upload tarball as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ffmpeg-prebuilt-${{ inputs.version }}
          name: ffmpeg prebuilt ${{ inputs.version }}
          body: |
            ffmpeg libs (LGPLv3, mux + RTMP + TLS, no encoders)
            consumed by Acrux's `build.rs`. Mac/Linux statically
            built from source via ffmpeg-sys-next; Windows
            repackaged from BtbN's prebuilt LGPL shared libs (DLLs
            shipped alongside Acrux.exe via Tauri's bundler).
            See SHA256s in the workflow log to paste into Acrux's
            `build.rs`.
          files: ${{ runner.temp }}/${{ matrix.tarball }}.tar.gz
          fail_on_unmatched_files: true
